<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPA & CGPA Calculator | Supersk</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Config & Styles -->
    <script src="../tailwind-config.js"></script>
    <link rel="stylesheet" href="../style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/favicon.png?v=6">
    <link rel="shortcut icon" href="../assets/favicon.png?v=6">
    <link rel="apple-touch-icon" href="../assets/favicon.png?v=6">
    
    <style>
        /* Custom scrollbar for table */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #16161a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #333; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444; 
        }
    </style>
</head>
<body class="bg-[#0E0E10] text-[#A1A1AA] antialiased selection:bg-indigo-500/30 selection:text-indigo-200 min-h-screen flex flex-col">

    <!-- Ambient Background -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] bg-indigo-600/5 rounded-full blur-[120px] mix-blend-screen"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-purple-600/5 rounded-full blur-[120px] mix-blend-screen"></div>
    </div>

    <!-- 1. Header (Glass) -->
    <header class="fixed top-0 left-0 right-0 z-50 h-16 border-b border-white/5 bg-[#0E0E10]/80 backdrop-blur-xl">
        <div class="container mx-auto px-6 h-full flex items-center justify-between">
            <a href="../index.html" class="flex items-center text-zinc-400 hover:text-white transition-colors text-sm font-medium group">
                <svg class="w-4 h-4 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Back to Portfolio
            </a>
            <span class="text-xs font-mono text-zinc-600">ENGINEERING UTILITY v2.0</span>
        </div>
    </header>

    <main class="relative z-10 flex-grow flex items-center justify-center py-28 px-4">
        
        <!-- Main Application Container -->
        <div class="w-full max-w-2xl">
            
            <!-- Header Group -->
            <div class="text-center mb-10">
                <h1 class="text-3xl md:text-4xl font-bold text-white font-heading tracking-tight mb-3">CGPA Calculator</h1>
                <p class="text-zinc-500 text-sm">Select your semester and input grades to track performance.</p>
            </div>

            <!-- Calculator Card -->
            <div class="rounded-3xl bg-[#16161A] border border-white/5 p-1 shadow-2xl">
                <div class="rounded-[20px] bg-[#111113] border border-white/5 p-6 md:p-8">
                    
                    <!-- 1. Semester Selection -->
                    <div class="flex flex-col gap-2 mb-8">
                        <label for="semesterSelect" class="text-xs font-bold text-zinc-400 uppercase tracking-wider ml-1">Configuration</label>
                        <div class="flex gap-4">
                            <div class="relative flex-grow">
                                <select id="semesterSelect" class="appearance-none w-full bg-[#0E0E10] text-white text-sm border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/50 transition-all cursor-pointer">
                                    <option value="" disabled selected>Select Previous Semester...</option>
                                    <!-- Options populated by JS -->
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-zinc-500">
                                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                            <button onclick="startCalculation()" class="shrink-0 bg-white text-black font-bold text-sm px-6 rounded-xl hover:bg-zinc-200 transition-colors">
                                Start
                            </button>
                        </div>
                    </div>

                    <!-- 2. Interactive Area -->
                    <!-- Fixed height container to prevent layout shifting -->
                    <div class="border-t border-white/5 pt-8 pb-4 mb-4 min-h-[140px] flex flex-col justify-center">
                        <div id="courseDisplay" class="text-center transition-all duration-300">
                            <span class="text-zinc-600 text-sm">Waiting for selection...</span>
                        </div>
                    </div>

                    <!-- 3. Keypad -->
                    <div class="grid grid-cols-6 gap-2 mb-8">
                        <button onclick="submitGrade(10)" class="h-12 rounded-lg bg-[#1D1D20] text-white font-bold text-sm hover:bg-indigo-600 hover:text-white transition-colors border border-white/5 active:scale-95">O</button>
                        <button onclick="submitGrade(9)" class="h-12 rounded-lg bg-[#1D1D20] text-white font-bold text-sm hover:bg-indigo-600 hover:text-white transition-colors border border-white/5 active:scale-95">A+</button>
                        <button onclick="submitGrade(8)" class="h-12 rounded-lg bg-[#1D1D20] text-white font-bold text-sm hover:bg-indigo-600 hover:text-white transition-colors border border-white/5 active:scale-95">A</button>
                        <button onclick="submitGrade(7)" class="h-12 rounded-lg bg-[#1D1D20] text-white font-bold text-sm hover:bg-indigo-600 hover:text-white transition-colors border border-white/5 active:scale-95">B+</button>
                        <button onclick="submitGrade(6)" class="h-12 rounded-lg bg-[#1D1D20] text-white font-bold text-sm hover:bg-indigo-600 hover:text-white transition-colors border border-white/5 active:scale-95">B</button>
                        <button onclick="submitGrade(5)" class="h-12 rounded-lg bg-[#1D1D20] text-white font-bold text-sm hover:bg-indigo-600 hover:text-white transition-colors border border-white/5 active:scale-95">C</button>
                    </div>

                    <!-- 4. Controls (Undo/Reset) -->
                    <div class="flex justify-between items-center text-xs">
                        <button onclick="correctGrade()" class="text-zinc-500 hover:text-zinc-300 transition-colors flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white/5">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
                            Undo Entry
                        </button>
                        <button onclick="restart()" class="text-red-400/80 hover:text-red-400 transition-colors flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white/5">
                            Reset Calculator
                        </button>
                    </div>

                </div>
            </div>

            <!-- Results Section (Hidden by default, slides down) -->
            <div id="resultTable" style="display:none" class="mt-8 animate-float">
                
                <!-- Score Card -->
                <div class="flex flex-col md:flex-row gap-4 mb-4">
                    <div class="flex-1 rounded-2xl bg-[#16161A] border border-white/5 p-6 flex flex-col items-center justify-center text-center">
                        <span class="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-1">GPA Score</span>
                        <div class="text-5xl font-bold text-white font-mono tracking-tighter" id="liveGPA">-</div>
                    </div>
                     <button onclick="downloadCSV()" class="flex-1 rounded-2xl bg-[#16161A] border border-white/5 p-6 flex flex-col items-center justify-center text-center hover:border-emerald-500/30 hover:bg-emerald-500/5 transition-all group cursor-pointer">
                        <svg class="w-6 h-6 text-emerald-500 mb-2 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        <span class="text-zinc-400 text-xs font-bold group-hover:text-emerald-400">Download CSV</span>
                    </button>
                </div>

                <!-- Detailed Table -->
                <div class="rounded-2xl bg-[#16161A] border border-white/5 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-zinc-400">
                            <thead class="bg-white/5 text-zinc-200 font-medium text-xs border-b border-white/5">
                                <tr>
                                    <th class="px-6 py-4 font-normal">Course</th>
                                    <th class="px-6 py-4 font-normal text-center">Grade</th>
                                    <th class="px-6 py-4 font-normal text-right">Pts</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>

                <div class="mt-4 text-center">
                     <p id="semWiseGPA" class="text-xs text-zinc-500 font-mono"></p>
                </div>

            </div>

        </div>
    </main>

    <!-- Logic Script (Preserved exactly as is) -->
    <script>
        const courseData = {
            "Semester I": [
                { "Course Name": "Technical Communication I", Credits: 2 },
                { "Course Name": "Linear Algebra and Calculus", Credits: 4 },
                { "Course Name": "Chemistry for Electronics Engineering", Credits: 4 },
                { "Course Name": "Programming using C", Credits: 4 },
                { "Course Name": "Engineering Graphics", Credits: 4 },
                { "Course Name": "Engineering Practices - Electrical and Electronics", Credits: 1 },
                { "Course Name": "Indian Constitution and Freedom Movement", Credits: 0 },
                { "Course Name": "Heritage of Tamils", Credits: 1 }
            ],
            "Semester II": [
                { "Course Name": "Technical Communication II/English for Professional Competence", Credits: 1 },
                { "Course Name": "Differential Equation and Complex Variables", Credits: 4 },
                { "Course Name": "Physics for Electronics Engineering", Credits: 4 },
                { "Course Name": "Data Structures", Credits: 5 },
                { "Course Name": "Electric Circuits", Credits: 3 },
                { "Course Name": "Electric Circuits Laboratory", Credits: 1 },
                { "Course Name": "Engineering Practices - Civil and Mechanical", Credits: 1 },
                { "Course Name": "Environmental Science and Engineering", Credits: 0 },
                { "Course Name": "Tamils and Technology", Credits: 1 }
            ],
            "Semester III": [
                { "Course Name": "Fourier Series and Number Theory", Credits: 4 },
                { "Course Name": "Electromagnetic Theory", Credits: 3 },
                { "Course Name": "Electrical Machines - I", Credits: 3 },
                { "Course Name": "Measurements and Instrumentation", Credits: 3 },
                { "Course Name": "Electronic Devices and Circuits", Credits: 3 },
                { "Course Name": "Power Plant Engineering", Credits: 3 },
                { "Course Name": "Electronic Devices and Circuits Laboratory", Credits: 1 },
                { "Course Name": "Introduction to Python Programming", Credits: 3 }
            ],
            "Semester IV": [
                { "Course Name": "Electrical Machines - II", Credits: 3 },
                { "Course Name": "Transmission and Distribution", Credits: 3 },
                { "Course Name": "Digital Logic Circuits", Credits: 4 },
                { "Course Name": "Linear Integrated Circuits and Applications", Credits: 4 },
                { "Course Name": "Open Elective - I", Credits: 3 },
                { "Course Name": "Electrical Machines Laboratory", Credits: 2 },
                { "Course Name": "Soft Skills-I", Credits: 1 },
                { "Course Name": "Python Programming for Machine Learning", Credits: 2 }
            ],
            "Semester V": [
                { "Course Name": "Power System Analysis", Credits: 3 },
                { "Course Name": "Power Electronics", Credits: 3 },
                { "Course Name": "Control Systems", Credits: 3 },
                { "Course Name": "Professional Elective I", Credits: 3 },
                { "Course Name": "Microprocessors, Microcontrollers and Applications", Credits: 4 },
                { "Course Name": "Open Elective - II", Credits: 3 },
                { "Course Name": "Control and Instrumentation Laboratory", Credits: 1 },
                { "Course Name": "Design Thinking and Innovation", Credits: 4 },
                { "Course Name": "Soft Skills-II", Credits: 1 }
            ],
            "Semester VI": [
                { "Course Name": "Protection and Switchgear", Credits: 3 },
                { "Course Name": "Solid State Drives", Credits: 3 },
                { "Course Name": "Electric Energy Utilization and Conservation", Credits: 3 },
                { "Course Name": "Applications of IoT in Electrical Engineering", Credits: 3 },
                { "Course Name": "Professional Elective II", Credits: 3 },
                { "Course Name": "Professional Elective III", Credits: 3 },
                { "Course Name": "Power Electronics and Drives Laboratory", Credits: 1 },
                { "Course Name": "Applications of AI and ML in Electrical Engineering", Credits: 2 },
                { "Course Name": "Problem Solving Techniques", Credits: 1 }
            ],
            "Semester VII": [
                { "Course Name": "Smart Grid", Credits: 3 },
                { "Course Name": "Power System Operation and Control", Credits: 3 },
                { "Course Name": "Renewable Energy Systems", Credits: 4 },
                { "Course Name": "Professional Elective IV", Credits: 3 },
                { "Course Name": "Professional Elective V", Credits: 3 },
                { "Course Name": "Project Work", Credits: 4 },
                { "Course Name": "Summer Internship", Credits: 1 }
            ],
            "Semester VIII": [
                { "Course Name": "Power System Planning and Reliability", Credits: 3 },
                { "Course Name": "Electric Vehicle Technology", Credits: 3 },
                { "Course Name": "Professional Elective VI", Credits: 3 },
                { "Course Name": "Project Work (Final)", Credits: 8 },
                { "Course Name": "Seminar", Credits: 2 }
            ]
        };

        const gradeLetters = {
            10: "O", 9: "A+", 8: "A", 7: "B+", 6: "B", 5: "C"
        };

        let selectedSemester = null;
        let currentCourseIndex = 0;
        let courses = [];
        let courseSemesters = [];
        let grades = [];
        let resultTableBody = null;

        const semesterSelect = document.getElementById("semesterSelect");
        Object.keys(courseData).forEach(sem => {
            const option = document.createElement("option");
            option.value = sem;
            option.textContent = sem;
            semesterSelect.appendChild(option);
        });

        const courseDisplay = document.getElementById("courseDisplay");
        const liveGPA = document.getElementById("liveGPA");
        const semWiseGPA = document.getElementById("semWiseGPA");
        const resultTable = document.getElementById("resultTable");
        resultTableBody = resultTable.querySelector("tbody");

        function startCalculation() {
            selectedSemester = semesterSelect.value;
            if (!selectedSemester) {
                alert("Please select a semester.");
                return;
            }
            courses = [];
            courseSemesters = [];
            for (let sem of Object.keys(courseData)) {
                for (const course of courseData[sem]) {
                    courses.push(course);
                    courseSemesters.push(sem);
                }
                if (sem === selectedSemester) break;
            }
            currentCourseIndex = 0;
            grades = new Array(courses.length).fill(null);
            liveGPA.textContent = "-";
            semWiseGPA.textContent = "";
            resultTable.style.display = "block"; /* Changed from table to block/flex for the card layout */
            resultTableBody.innerHTML = "";
            showNextCourse();
        }

        function showNextCourse() {
            if (currentCourseIndex >= courses.length) {
                courseDisplay.innerHTML = `<span class="text-emerald-400 font-medium">Calculation Complete</span>`;
                updateGPA();
                return;
            }
            const course = courses[currentCourseIndex];
            // Fixed height content for display
            courseDisplay.innerHTML = `
                <div class="flex flex-col items-center">
                    <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Grading Now</p>
                    <h3 class="text-xl md:text-2xl font-bold text-white mb-3 leading-tight max-w-sm">${course["Course Name"]}</h3>
                    <div class="inline-flex items-center px-3 py-1 rounded bg-[#0E0E10] border border-white/5 text-zinc-400 text-xs font-mono">
                        CREDITS: <span class="text-indigo-400 ml-2 font-bold">${course.Credits}</span>
                    </div>
                </div>
            `;
        }

        function submitGrade(grade) {
            if (currentCourseIndex >= courses.length) return;
            grades[currentCourseIndex] = grade;
            currentCourseIndex++;
            updateTable();
            updateGPA();
            showNextCourse();
        }

        function correctGrade() {
            if (currentCourseIndex === 0) {
                 // Subtle flicker or msg
                 return;
            }
            currentCourseIndex--;
            grades[currentCourseIndex] = null;
            updateTable();
            updateGPA();
            showNextCourse();
        }

        function restart() {
            selectedSemester = null;
            currentCourseIndex = 0;
            courses = [];
            grades = [];
            courseSemesters = [];
            courseDisplay.innerHTML = '<span class="text-zinc-600 text-sm">Waiting for selection...</span>';
            liveGPA.textContent = "-";
            semWiseGPA.textContent = "";
            resultTableBody.innerHTML = "";
            resultTable.style.display = "none";
            semesterSelect.selectedIndex = 0;
        }

        function updateTable() {
            resultTableBody.innerHTML = "";
            let totalWeightedPoints = 0;
            for (let i = 0; i < grades.length; i++) {
                if (grades[i] === null) break;
                totalWeightedPoints += grades[i] * courses[i].Credits;
            }

            for (let i = 0; i < grades.length; i++) {
                if (grades[i] === null) continue;
                const course = courses[i];
                const credit = course.Credits;
                const gradePoint = grades[i];
                const weighted = credit * gradePoint;
                
                // Simplified row for the compact card
                const row = document.createElement("tr");
                row.className = "hover:bg-white/5 transition-colors border-b border-white/5 last:border-0";
                row.innerHTML = `
                    <td class="px-6 py-4 font-medium text-white truncate max-w-[200px]">${course["Course Name"]}</td>
                    <td class="px-6 py-4 text-center font-mono text-indigo-400 font-bold">${gradeLetters[gradePoint]}</td>
                    <td class="px-6 py-4 text-right text-zinc-500">${weighted}</td>
                `;
                resultTableBody.appendChild(row);
            }
        }

        function updateGPA() {
            if (grades.every(g => g === null)) {
                liveGPA.textContent = "-";
                semWiseGPA.textContent = "";
                return;
            }

            let totalCreditsAll = 0;
            let totalWeightedPointsAll = 0;
            const semCredits = {};
            const semWeightedPoints = {};

            for (let i = 0; i < grades.length; i++) {
                if (grades[i] === null) break;
                const sem = courseSemesters[i];
                const credit = courses[i].Credits;
                const gp = grades[i];
                const weighted = credit * gp;

                totalCreditsAll += credit;
                totalWeightedPointsAll += weighted;

                if (!semCredits[sem]) semCredits[sem] = 0;
                if (!semWeightedPoints[sem]) semWeightedPoints[sem] = 0;

                semCredits[sem] += credit;
                semWeightedPoints[sem] += weighted;
            }

            const cgpa = totalCreditsAll ? (totalWeightedPointsAll / totalCreditsAll) : 0;
            liveGPA.textContent = cgpa.toFixed(2);

            let semGPAStrings = [];
            for (const sem of Object.keys(semCredits)) {
                const gpa = semWeightedPoints[sem] / semCredits[sem];
                semGPAStrings.push(`<span class="text-zinc-500">${sem}:</span> <span class="text-white font-bold ml-1">${gpa.toFixed(2)}</span>`);
            }
            semWiseGPA.innerHTML = semGPAStrings.join(" <span class='text-zinc-700 mx-3'>/</span> ");
        }

        function downloadCSV() {
            if (grades.every(g => g === null)) {
                alert("No grades to export.");
                return;
            }
            const header = ["Course Name", "Grade", "Credits", "Grade Point", "Grade x Credits", "Weightage", "Semester"];
            let csvRows = [];
            csvRows.push(header.join(","));

            let totalWeightedPoints = 0;
            for (let i = 0; i < grades.length; i++) {
                if (grades[i] === null) break;
                totalWeightedPoints += grades[i] * courses[i].Credits;
            }

            for (let i = 0; i < grades.length; i++) {
                if (grades[i] === null) continue;
                const course = courses[i];
                const credit = course.Credits;
                const gradePoint = grades[i];
                const weighted = credit * gradePoint;
                const weightage = totalWeightedPoints ? (weighted / totalWeightedPoints).toFixed(3) : "0.000";
                
                const row = [
                    `"${course["Course Name"]}"`,
                    gradeLetters[gradePoint],
                    credit,
                    gradePoint,
                    weighted,
                    weightage,
                    courseSemesters[i]
                ];
                csvRows.push(row.join(","));
            }

            const csvString = csvRows.join("\n");
            const blob = new Blob([csvString], { type: "text/csv" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.setAttribute("hidden", "");
            a.setAttribute("href", url);
            a.setAttribute("download", "cgpa_report.csv");
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>

</body>
</html>
